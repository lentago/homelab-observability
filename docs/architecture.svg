<svg width="100%" viewBox="0 -32 820 930" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .ti { font-size: 18px; font-weight: 600; fill: #1a1a2e; }
