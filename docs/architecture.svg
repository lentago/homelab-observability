  .ts { font-size: 12px; font-weight: 400; fill: #73726c; }
  .tl { font-size: 11px; font-weight: 400; fill: #93928c; }
  .arr { stroke: #73726c; stroke-width: 1.5; }

  .c-navy > rect { fill: #E4E8F0; stroke: #1a1a2e; }
  .c-navy > text.th { fill: #1a1a2e; }
  .c-navy > text.ts { fill: #3d5a80; }

  .c-coral > rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > text.th { fill: #712B13; }
  .c-coral > text.ts { fill: #993C1D; }

  .c-amber > rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber > text.th { fill: #633806; }
  .c-amber > text.ts { fill: #854F0B; }

  .c-green > rect { fill: #EAF3DE; stroke: #3B6D11; }
  .c-green > text.th { fill: #27500A; }
  .c-green > text.ts { fill: #3B6D11; }

  .c-blue > rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > text.th { fill: #0C447C; }
  .c-blue > text.ts { fill: #185FA5; }

  .c-pink > rect { fill: #FBEAF0; stroke: #993556; }
  .c-pink > text.th { fill: #72243E; }
  .c-pink > text.ts { fill: #993556; }

  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text.th { fill: #3C3489; }
  .c-purple > text.ts { fill: #534AB7; }

  .c-teal > rect { fill: #DAF1EC; stroke: #1F6E66; }
  .c-teal > text.th { fill: #0F4A44; }
  .c-teal > text.ts { fill: #1F6E66; }

  .c-slate > rect { fill: #EDEFF2; stroke: #4A5568; }
  .c-slate > text.th { fill: #2D3748; }
  .c-slate > text.ts { fill: #4A5568; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#73726c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Title -->
<text class="ti" x="400" y="-10" text-anchor="middle">Homelab Observability — Architecture</text>

<!-- ==================== DATA SOURCES ==================== -->
<text class="tl" x="400" y="16" text-anchor="middle">DATA SOURCES</text>

<!-- Firewalla Gold SE -->
<g class="c-coral">
  <rect x="30" y="30" width="220" height="100" rx="8" stroke-width="1"/>
  <text class="th" x="140" y="52" text-anchor="middle">Firewalla Gold SE</text>
  <text class="ts" x="140" y="72" text-anchor="middle">192.168.139.1</text>
  <text class="ts" x="140" y="90" text-anchor="middle">Fluent Bit + Zeek IDS</text>
  <text class="ts" x="140" y="108" text-anchor="middle">dns.log, conn.log, ssl.log, acl-audit.log</text>
</g>

<!-- Proxmox pve -->
<g class="c-amber">
  <rect x="280" y="30" width="210" height="100" rx="8" stroke-width="1"/>
  <text class="th" x="385" y="52" text-anchor="middle">pve (Proxmox)</text>
  <text class="ts" x="385" y="72" text-anchor="middle">192.168.139.8</text>
  <text class="ts" x="385" y="90" text-anchor="middle">node_exporter :9100</text>
  <text class="ts" x="385" y="108" text-anchor="middle">CPU / mem / disk / net</text>
</g>

<!-- Proxmox pve2 -->
<g class="c-amber">
  <rect x="520" y="30" width="210" height="100" rx="8" stroke-width="1"/>
  <text class="th" x="625" y="52" text-anchor="middle">pve2 (Proxmox)</text>
  <text class="ts" x="625" y="72" text-anchor="middle">192.168.139.7</text>
  <text class="ts" x="625" y="90" text-anchor="middle">node_exporter :9100</text>
  <text class="ts" x="625" y="108" text-anchor="middle">CPU / mem / disk / ZFS</text>
</g>

<!-- Home Assistant -->
<g class="c-green">
  <rect x="280" y="155" width="220" height="68" rx="8" stroke-width="1"/>
  <text class="th" x="390" y="177" text-anchor="middle">Home Assistant</text>
  <text class="ts" x="390" y="195" text-anchor="middle">192.168.139.172:8123</text>
  <text class="ts" x="390" y="211" text-anchor="middle">/api/prometheus (bearer token)</text>
</g>

<!-- node_exporter annotation: spans both Proxmox boxes -->
<text class="tl" x="505" y="148" text-anchor="middle">bare-metal systemd service on each host</text>

<!-- ==================== NETWORK BOUNDARY ==================== -->
<line x1="40" y1="248" x2="760" y2="248" stroke="#73726c" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="tl" x="400" y="265" text-anchor="middle">LAN only — no inbound from internet</text>

<!-- ==================== LXC CONTAINER ==================== -->
<g class="c-navy">
  <rect x="30" y="280" width="730" height="180" rx="20" stroke-width="1"/>
  <text class="th" x="395" y="306" text-anchor="middle">Proxmox LXC 105 — grafana-stack (192.168.139.20)</text>
  <text class="ts" x="395" y="324" text-anchor="middle">Docker Compose</text>
</g>

<!-- Alloy collector (single container, replaces the old 4-service stack) -->
<g class="c-purple">
  <rect x="80" y="345" width="630" height="100" rx="8" stroke-width="1"/>
  <text class="th" x="395" y="367" text-anchor="middle">Alloy v1.6.1</text>
  <text class="ts" x="395" y="386" text-anchor="middle">loki.source.api :3100  ·  Promtail-compatible push receiver (Firewalla)</text>
  <text class="ts" x="395" y="404" text-anchor="middle">prometheus.exporter.blackbox (native, ICMP + HTTP_2xx) · prometheus.scrape (node, HA)</text>
  <text class="ts" x="395" y="422" text-anchor="middle">loki.write · prometheus.remote_write  →  Grafana Cloud</text>
  <text class="ts" x="395" y="440" text-anchor="middle">external_labels: cluster="homelab"  ·  debug UI :12345</text>
</g>

<!-- ==================== ARROWS: Sources → Alloy ==================== -->

<!-- Firewalla → Alloy (push) -->
<line x1="140" y1="130" x2="200" y2="343" class="arr" marker-end="url(#arrow)"/>
<text class="tl" x="160" y="235" text-anchor="start">push (Promtail-compatible)</text>

<!-- pve → Alloy (scrape) -->
<line x1="385" y1="130" x2="385" y2="343" class="arr" marker-end="url(#arrow)"/>

<!-- pve2 → Alloy (scrape) -->
<line x1="625" y1="130" x2="500" y2="343" class="arr" marker-end="url(#arrow)"/>

<!-- HA → Alloy (scrape) -->
<line x1="390" y1="223" x2="395" y2="343" class="arr" marker-end="url(#arrow)"/>

<!-- Alloy blackbox → LAN (outbound probes) -->
<line x1="710" y1="395" x2="775" y2="395" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
<text class="tl" x="780" y="391" text-anchor="start">→ LAN</text>
<text class="tl" x="780" y="406" text-anchor="start">probes</text>

<!-- ==================== CLOUD BOUNDARY ==================== -->
<line x1="40" y1="488" x2="760" y2="488" stroke="#73726c" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="tl" x="400" y="505" text-anchor="middle">HTTPS outbound to *.grafana.net — no inbound from internet</text>

<!-- ==================== GRAFANA CLOUD ==================== -->
<g class="c-pink">
  <rect x="30" y="520" width="730" height="160" rx="20" stroke-width="1"/>
  <text class="th" x="395" y="546" text-anchor="middle">Grafana Cloud — pitzilabs.grafana.net (free tier)</text>
  <text class="ts" x="395" y="564" text-anchor="middle">storage + UI; resources Terraform-managed (grafana/grafana provider)</text>
</g>

<!-- Mimir -->
<g class="c-blue">
  <rect x="60" y="588" width="210" height="72" rx="8" stroke-width="1"/>
  <text class="th" x="165" y="610" text-anchor="middle">Mimir (metrics)</text>
  <text class="ts" x="165" y="628" text-anchor="middle">grafanacloud-pitzilabs-prom</text>
  <text class="ts" x="165" y="646" text-anchor="middle">cluster="homelab"</text>
</g>

<!-- Loki -->
<g class="c-purple">
  <rect x="290" y="588" width="210" height="72" rx="8" stroke-width="1"/>
  <text class="th" x="395" y="610" text-anchor="middle">Loki (logs)</text>
  <text class="ts" x="395" y="628" text-anchor="middle">grafanacloud-pitzilabs-logs</text>
  <text class="ts" x="395" y="646" text-anchor="middle">log_source: zeek_dns, _conn, _ssl, firewalla_acl</text>
</g>

<!-- Grafana UI -->
<g class="c-pink">
  <rect x="520" y="588" width="210" height="72" rx="8" stroke-width="1"/>
  <text class="th" x="625" y="610" text-anchor="middle">Grafana UI</text>
  <text class="ts" x="625" y="628" text-anchor="middle">dashboards/*.json (Terraform)</text>
  <text class="ts" x="625" y="646" text-anchor="middle">public-share for kiosk</text>
</g>

<!-- Alloy → Cloud arrows -->
<line x1="300" y1="445" x2="195" y2="586" class="arr" marker-end="url(#arrow)"/>
<text class="tl" x="220" y="510" text-anchor="start">remote_write</text>
<line x1="490" y1="445" x2="595" y2="586" class="arr" marker-end="url(#arrow)"/>
<text class="tl" x="555" y="510" text-anchor="start">loki.write</text>

