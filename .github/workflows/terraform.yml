name: terraform

on:
  # PR trigger is intentionally NOT path-filtered: the `gate` job below is a
  # required status check, and a required check whose *workflow* never triggers
  # is held "Expected" forever (deadlock). So the workflow always runs on PRs and
  # the path filter moves down to the `changes` job, which skips the heavy jobs
  # on docs-only PRs (a *skipped* required job counts as passing).
  # See lentago/.github#27.
  pull_request:
  push:
    branches: [main]
    # apply stays path-gated: never re-apply on a merge that didn't touch these.
    paths:
      - "terraform/**"
      - "dashboards/**"
      - ".github/workflows/terraform.yml"

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write # OIDC → AWS for the S3 state backend (plan + apply jobs)

env:
  # OIDC role (least-privilege: this repo's S3 state key + the lock table only).
  AWS_ROLE: arn:aws:iam::365184644049:role/homelab-observability-github-actions-terraform
  AWS_REGION: us-east-1

jobs:
  # Did this PR touch terraform/dashboards? Gates the heavy jobs so a docs-only
  # PR skips them (skipped → the required `gate` check still reports green).
  # Non-PR events (push to main, already path-filtered above) always count as
  # changed.
  changes:
    runs-on: ubuntu-latest
    outputs:
      tf: ${{ steps.filter.outputs.tf }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect terraform/dashboard changes
        id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "tf=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed=$(git diff --name-only "$BASE_SHA" HEAD)
          echo "changed files:"; echo "$changed"
          if echo "$changed" | grep -qE '^terraform/|^dashboards/|^\.github/workflows/terraform\.yml$'; then
            echo "tf=true" >> "$GITHUB_OUTPUT"
          else
            echo "tf=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    needs: changes
    if: needs.changes.outputs.tf == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: fmt
        run: terraform fmt -check -recursive

      - name: init (no backend)
        run: terraform init -backend=false -input=false

      - name: validate
        run: terraform validate -no-color

  plan:
    needs: [changes, validate]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.tf == 'true' && github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: terraform
    env:
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_AUTH: ${{ secrets.GRAFANA_AUTH }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Grafana Cloud secrets
        run: |
          if [ -z "${GRAFANA_URL:-}" ] || [ -z "${GRAFANA_AUTH:-}" ]; then
            echo "::error::Set repository secrets GRAFANA_URL and GRAFANA_AUTH (see terraform/README.md § CI). They were empty in this run."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC → S3 state)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: init
        run: terraform init -input=false

      - name: plan
        id: plan
        continue-on-error: true
        run: |
          set -o pipefail
          terraform plan -no-color -input=false -lock=false \
            -out=tfplan 2>&1 | tee plan.txt
          PLAN_EXIT=${PIPESTATUS[0]}
          {
            echo 'plan<<EOF'
            tail -c 60000 plan.txt
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          exit "$PLAN_EXIT"

      - name: comment on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.plan }}
          OUTCOME: ${{ steps.plan.outcome }}
        with:
          script: |
            const plan = process.env.PLAN || '(no plan output captured)';
            const outcome = process.env.OUTCOME;
            const body = [
              `### terraform plan (${outcome})`,
              '```',
              plan,
              '```',
            ].join('\n');
            return github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if terraform plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  apply:
    needs: [changes, validate]
    runs-on: ubuntu-latest
    if: >-
      needs.changes.outputs.tf == 'true' &&
      github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Serialize applies so two quick merges can't race on the same state.
    concurrency:
      group: terraform-apply
      cancel-in-progress: false
    defaults:
      run:
        working-directory: terraform
    env:
      GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
      GRAFANA_AUTH: ${{ secrets.GRAFANA_AUTH }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Grafana Cloud secrets
        run: |
          if [ -z "${GRAFANA_URL:-}" ] || [ -z "${GRAFANA_AUTH:-}" ]; then
            echo "::error::Set repository secrets GRAFANA_URL and GRAFANA_AUTH (see terraform/README.md § CI). They were empty in this run."
            exit 1
          fi

      - name: Configure AWS credentials (OIDC → S3 state)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.14.9"
          terraform_wrapper: false

      - name: init
        run: terraform init -input=false

      - name: apply
        run: terraform apply -auto-approve -no-color -input=false

  # Single required status check for the terraform pipeline. Runs on every PR
  # (if: always()) so the ruleset can require exactly `gate`: it reports green
  # when validate/plan succeeded OR were skipped (docs-only PR), and red when
  # either failed — so a bad plan blocks the merge, and therefore the apply.
  gate:
    needs: [changes, validate, plan]
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Terraform gate
        run: |
          echo "changes=${{ needs.changes.result }} validate=${{ needs.validate.result }} plan=${{ needs.plan.result }}"
          for r in "${{ needs.changes.result }}" "${{ needs.validate.result }}" "${{ needs.plan.result }}"; do
            case "$r" in
              failure|cancelled)
                echo "::error::terraform gate blocked (a required job reported $r)"
                exit 1 ;;
            esac
          done
          echo "gate passed (success/skipped only)"
