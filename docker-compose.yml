services:
  alloy:
    image: grafana/alloy:v1.6.1
    container_name: alloy
    restart: unless-stopped
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "3100:3100"   # Loki push receiver (Promtail on the Firewalla points here)
      - "12345:12345" # Alloy debug UI (http://<host>:12345)
    volumes:
      # Mount the whole alloy/ dir (not individual files) so a git-driven
      # config update — which replaces files with new inodes — is visible to the
      # container. With single-file bind mounts the container keeps reading the
      # original inode after an atomic-replace, so a SIGHUP reload sees stale
      # config. Directory mounts resolve paths live, so reloads pick up changes.
      - ./alloy:/etc/alloy:ro
      - alloy-data:/var/lib/alloy/data
    environment:
      GRAFANA_CLOUD_METRICS_URL:   "${GRAFANA_CLOUD_METRICS_URL}"
      GRAFANA_CLOUD_METRICS_USER:  "${GRAFANA_CLOUD_METRICS_USER}"
      GRAFANA_CLOUD_METRICS_TOKEN: "${GRAFANA_CLOUD_METRICS_TOKEN}"
      GRAFANA_CLOUD_LOGS_URL:      "${GRAFANA_CLOUD_LOGS_URL}"
      GRAFANA_CLOUD_LOGS_USER:     "${GRAFANA_CLOUD_LOGS_USER}"
      GRAFANA_CLOUD_LOGS_TOKEN:    "${GRAFANA_CLOUD_LOGS_TOKEN}"
    cap_add:
      - NET_RAW # required for ICMP probes

volumes:
  alloy-data:
